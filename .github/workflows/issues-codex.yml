name: Issues Codex

'on':
  issues:
    types:
      - opened
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

permissions:
  issues: write

jobs:
  ask-codex:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.issue.pull_request == null && github.event.issue.state == 'open')
    runs-on: ubuntu-latest

    steps:
      - name: Resolve issue number
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "issue_number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "issue_number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger Codex
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.CODEX_DISPATCH_TOKEN }}
          script: |
            const issueNumber = Number('${{ steps.resolve.outputs.issue_number }}');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `@codex implement this issue.\nRead replit.md first.\nUpdate release_notes.\nCreate a branch from latest main.\nOpen a PR against main.\nMention: Closes #${issueNumber}`
            });
