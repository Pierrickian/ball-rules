name: Auto dispatch Codex on new issues

on:
issues:
types:
- opened

permissions:
issues: write

jobs:
ask-codex:
runs-on: ubuntu-latest

steps:
  - name: Trigger Codex
    uses: actions/github-script@v7
    with:
      script: |
        const issueNumber = context.payload.issue.number;

        await github.rest.issues.createComment({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: issueNumber,
          body: `@codex implement this issue.

Read replit.md first.
Read skills/new/SKILL.md.
Update release_notes in artifacts/3d-game/public/game_config.json.
Create a branch from latest main.
Open a PR against main.
Mention: Closes #${issueNumber}`
});