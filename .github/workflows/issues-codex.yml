name: Issues Codex

'on':
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Debug
        run: |
          echo "Issue received"
          echo "${{ github.event.issue.title }}"

      - name: Comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number,
              body: "@codex implement this issue"
            })
        await github.rest.issues.createComment({
          owner: context.repo.owner,
          repo: context.repo.repo,
          issue_number: issueNumber,
          body: `@codex implement this issue.

Read replit.md first.
Read skills/new/SKILL.md.
Update release_notes in artifacts/3d-game/public/game_config.json.
Create a branch from latest main.
Open a PR against main.
Mention: Closes #${issueNumber}`
});