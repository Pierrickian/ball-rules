name: Issues Codex

'on':
  issues:
    types:
      - opened

permissions:
  issues: write

jobs:
  ask-codex:
    if: ${{ github.event.issue.pull_request == null && github.event.issue.state == 'open' }}
    runs-on: ubuntu-latest

    steps:
      - name: Trigger Codex
        uses: actions/github-script@v7
        with:
          github-token: ${{secrets.CODEX_DISPATCH_TOKEN}}
          script: |
            const issueNumber = context.payload.issue.number;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: `@codex implement this issue.
              Read replit.md first.
              Update release_notes.
              Create a branch from latest main.
              Open a PR against main.
              Mention: Closes #${issueNumber}`
            });
